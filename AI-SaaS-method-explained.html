<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SaaS Method Explained</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container mx-auto p-5">
        <h1 class="text-4xl font-bold mb-4">AI SaaS Method Explained</h1>
        <section class="mb-8">
            <h2 class="text-2xl font-semibold">Interactive Architecture Viewer</h2>
            <div id="architecture-viewer" class="border p-5">
                <p>Content for architecture viewer...</p>
            </div>
        </section>
        <section class="mb-8">
            <h2 class="text-2xl font-semibold">Sequence Diagram</h2>
            <img src="path/to/sequence-diagram.png" alt="Sequence Diagram" class="w-full">
        </section>
        <section class="mb-8">
            <h2 class="text-2xl font-semibold">Business Analysis</h2>
            <p>Business analysis content goes here...</p>
        </section>
        <section class="mb-8">
            <h2 class="text-2xl font-semibold">Data Visualization</h2>
            <canvas id="myChart" class="w-full h-96"></canvas>
            <script>
                var ctx = document.getElementById('myChart').getContext('2d');
                var myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['January', 'February', 'March', 'April', 'May', 'June', 'July'],
                        datasets: [{
                            label: 'Demo Data',
                            data: [65, 59, 80, 81, 56, 55, 40],
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            </script>
        </section>
    </div>
</body>
</html>
